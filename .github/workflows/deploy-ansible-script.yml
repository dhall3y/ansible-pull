name: deploy ansible.sh

on:
  workflow_dispatch:

jobs:
  setup-wireguard:
    runs-on: ubuntu-latest
    outputs:
      wg-interface: wg0
    steps:
      - run: sudo apt install wireguard

      - run: echo "${{ secrets.WIREGUARD_PRIVATE_KEY }}" > privatekey

      - run: sudo ip link add dev wg0 type wireguard

      - run: sudo ip address add dev wg0 10.0.0.4 peer 10.0.0.1

      - run: sudo wg set wg0 listen-port 48123 private-key privatekey peer DtiplHBOyjn+SfnSHnBWDtqm9v2oz+nsNDQ3kALOui4= allowed-ips 0.0.0.0/0 endpoint wireguard.muracci.me:51820

      - run: sudo ip link set up dev wg0

      - run: curl -vvv http://192.168.0.12:8888

  rsync-job:
    runs-on: ubuntu-latest
    needs: setup-wireguard
    steps:
      - name: echo
        run: echo 'test finished'
