name: deploy ansible.sh

on:
  workflow_dispatch:

jobs:
  setup-wireguard:
    runs-on: ubuntu-latest
    outputs:
      wg-interface: wg0
    steps:
      - name: Install WireGuard
        run: sudo apt-get update && sudo apt-get install -y wireguard iproute2

      - name: Setup WireGuard interface
        run: |
          echo "${{ secrets.WIREGUARD_PRIVATE_KEY }}" > privatekey
          sudo ip link add dev wg0 type wireguard
          sudo ip address add dev wg0 10.0.0.4 peer 10.0.0.1
          sudo wg set wg0 listen-port 48123 private-key privatekey peer v/M0zEAqKvFyeeg6wLSV0m4Nu51I/zL+fym3PVgv4D4= allowed-ips 0.0.0.0/0 endpoint wireguard.muracci.me:51820
          sudo ip link set up dev wg0
      - name: Debug IP
        run: |
          ip a show wg0
          ip route
          ping -c 2 10.0.0.1 || true
          ping -c 2 192.168.0.12 || true

      - name: Set DNS for wg0
        run: |
          sudo resolvectl dns wg0 192.168.0.12
          sudo resolvectl domain wg0 ~.

      - name: Test connectivity
        run: curl -v --max-time 10 http://nginx.homelab.int

  rsync-job:
    runs-on: ubuntu-latest
    needs: setup-wireguard
    steps:
      - name: echo
        run: echo 'test finished'
